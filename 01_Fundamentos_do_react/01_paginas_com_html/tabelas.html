<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
</head>
<body>
    <h1 style="text-align: center; color:deeppink">TABELAS</h1>
    <p style="text-align: center;">Listas de dados em duas dimensões e compostas por linhas e colunas.</p>

    <table border="1">
        <thead>
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Idade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>01</td>
                <td>Pablo</td>
                <td>20</td>
            </tr>
            <tr>
                <td>02</td>
                <td>José</td>
                <td>30</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Soma da idade: 50</td>
            </tr>
        </tfoot>

    </table>
    <br><br>
    <table border="1" width="500">
        <thead style="background-color:antiquewhite;">
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Idade</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>01</td>
                <td>Pablo</td>
                <td>20</td>
                <td>pablo@email.com</td>
            </tr>
            <tr>
                <td align="right">02</td>
                <td>José</td>
                <td>30</td>
                <td style="height:100px">jose@email.com</td>
            </tr>
            <tr>
                <td>03</td>
                <td>Maria</td>
                <td>25</td>
                <td>maria@email.com</td>
            </tr>
            <tr>
                <td style="color: red;">04</td>
                <td>Ana</td>
                <td>18</td>
                <td></td>
            </tr>
            <tr>
                <td align="center">05</td>
                <td>Fulano</td>
                <td>29</td>
                <td>fulano@gmail.com</td>
            </tr>
        </tbody>

    </table>
</body>
</html>
